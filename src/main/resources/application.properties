spring.application.name=budgetmanager

# Load local environment file (not committed) for sensitive settings.
spring.config.import=optional:file:.env[.properties],optional:dotenv:./.env

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/budgetmanager}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=${JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=${JPA_FORMAT_SQL:true}
spring.jpa.open-in-view=${JPA_OPEN_IN_VIEW:false}
server.port=${SERVER_PORT:8080}

# Jackson datetime deserialization - support ISO 8601 format
spring.jackson.time-zone=UTC
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null
